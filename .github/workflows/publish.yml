name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify NPM_TOKEN secret
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is missing. Settings → Secrets and variables → Actions → New repository secret → Name: NPM_TOKEN"
            exit 1
          fi
          echo "NPM_TOKEN is set (${#NODE_AUTH_TOKEN} chars)"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish eslint-plugin-next-arch
        working-directory: packages/eslint-plugin-next-arch
        run: |
          PKG="eslint-plugin-next-arch"
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG}@${VERSION} already on npm — skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @yousxlfs/next-arch
        working-directory: packages/next-arch
        run: |
          PKG="@yousxlfs/next-arch"
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG}@${VERSION} already on npm — skipping"
          else
            npm publish --access public --provenance
          fi
